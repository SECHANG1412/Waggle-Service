name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy To EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            echo "[1/10] Move to project directory"
            cd /home/ubuntu/Waggle-Service

            echo "[2/10] Pull latest code"
            git checkout main
            git pull --ff-only

            echo "[3/10] Rebuild backend container"
            docker compose up -d --build backend

            echo "[4/10] Run Alembic migration"
            docker compose exec backend alembic upgrade head

            echo "[5/10] Build frontend assets"
            cd /home/ubuntu/Waggle-Service/frontend
            npm ci
            npm run build

            echo "[6/10] Validate and reload nginx"
            sudo nginx -t
            sudo systemctl reload nginx

            echo "[7/10] Check running containers"
            cd /home/ubuntu/Waggle-Service
            docker compose ps

            echo "[8/10] Check application health"
            curl -f http://localhost:8000/health > /dev/null || {
              echo "Application health check failed"
              exit 1
            }

            echo "[9/10] Check database health"
            curl -f http://localhost:8000/health/db > /dev/null || {
              echo "Database health check failed"
              exit 1
            }

            echo "[10/10] Run topics smoke test"
            curl -f "http://localhost:8000/topics?page=1&limit=10" > /dev/null || {
              echo "Topics API health check failed"
              exit 1
            }
